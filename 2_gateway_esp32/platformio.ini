[platformio]
src_dir = main

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = espidf

; Serial Monitor options
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build options
build_flags = 
    -D CONFIG_WIFI_SSID=\"YourSSID\"
    -D CONFIG_WIFI_PASSWORD=\"YourPass\"
    -D CONFIG_OTA_SERVER_URL=\"http://192.168.1.100:8000\"
