; PlatformIO Configuration for STM32 Bootloader
;
; Bootloader resides at 0x08000000 (start of Flash)
; Size: 12KB (0x08000000 - 0x08002FFF)

[env:stm32f103_boot]
platform = ststm32
board = bluepill_f103c8
framework = stm32cube

; Build configuration
build_flags = 
    -D STM32F103xB
    -D USE_HAL_DRIVER
    -D HSE_VALUE=8000000
    ; Bootloader starts at 0x00 (default VTOR)
    -D VECT_TAB_OFFSET=0x0000
    ; Size optimization (critical for 12KB limit)
    -Os
    -include stddef.h
    -I ../../common

; Linker script for bootloader (starts at 0x08000000, 12KB)
board_build.ldscript = STM32F103_Boot.ld

; Upload settings (using ST-Link)
upload_protocol = stlink
debug_tool = stlink

; Source filter
build_src_filter = 
    +<*>

; No external library dependencies (keep bootloader small)
; lib_deps = 

; Monitor settings
monitor_speed = 115200
monitor_port = COM3
