; PlatformIO Configuration for STM32 Application
;
; This is the main application project with OTA support.
; The bootloader should be flashed separately.

[env:stm32f103]
platform = ststm32
board = bluepill_f103c8
framework = stm32cube

; Build configuration
build_flags = 
    -D STM32F103xB
    -D USE_HAL_DRIVER
    -D HSE_VALUE=8000000
    ; Application starts after bootloader
    -D VECT_TAB_OFFSET=0x4000
    ; Enable size optimization
    -Os
    -include stddef.h
    -I ../../common
    -I .pio/libdeps/stm32f103/micro-ecc

; Linker script for application (starts at 0x08004000)
board_build.ldscript = STM32F103_App.ld

; Upload settings (using ST-Link)
upload_protocol = stlink
debug_tool = stlink

; Include paths
build_src_filter = 
    +<*>

; Library dependencies
lib_deps = 
    kmackay/micro-ecc

; Force LDF to include all libraries
lib_ldf_mode = deep+

; Extra scripts for post-build processing
; extra_scripts = 
;     post:generate_ota_package.py

; Monitor settings for debugging
monitor_speed = 115200
monitor_port = COM3
